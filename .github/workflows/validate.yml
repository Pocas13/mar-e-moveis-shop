name: Validar projeto

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mar_e_moveis_shop
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mar_e_moveis_shop?schema=public
      NEXTAUTH_URL: http://localhost:3004
      NEXTAUTH_SECRET: github-actions-secret-only
      NEXT_PUBLIC_SITE_URL: http://localhost:3004
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
      RESEND_API_KEY: ""
      SAGE_MODE: disabled

    steps:
      - name: Obter codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar Prisma
        run: npx prisma validate

      - name: Preparar base de dados
        run: npx prisma db push

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Verificar TypeScript
        run: npm run typecheck

      - name: Compilar aplicacao
        run: npm run build
